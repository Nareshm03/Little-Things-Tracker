kind = "web"
previewPath = "/"
title = "The Little Things We Never Want To Forget"
version = "1.0.0"
id = "artifacts/scrapbook"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20030

[services.development]
run = "pnpm --filter @workspace/scrapbook run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/scrapbook", "run", "build" ]
serve = "static"
publicDir = "artifacts/scrapbook/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20030"
BASE_PATH = "/"
